                .scroll-wrapper {
                    height: 100vh;

                    padding: 30px;
                    box-sizing: border-box;
                }

                .scroll-wrapper::-webkit-scrollbar {
                    width: 7px;
                    background: white;
                }

                    background: gray;
                }
                .scroll-wrapper::-webkit-scrollbar-thumb:hover {

                .occupation-grid {
                    display: grid;
                    grid-template-columns: 1fr;
                    gap: 25px;
                    width: 100%;
                    max-width: 100%;
                    margin: 0 auto;
                }

                .card {
                    background: #111;
                    border: 1px solid #333;
                    border-left: 4px solid var(--current-color);
                    display: grid;
                    grid-template-columns: 140px 1fr;
                    position: relative;
                    overflow: hidden;
                    box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
                    transition: all 0.3s ease;
                    font-family: 'Press Start 2P', cursive;

                    z-index: 5;

                    z-index: 5; pointer-events: none;

                    position: relative;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    border-right: 1px solid #222;
                }

                .visual::before {
                    content: ''; position: absolute; inset: 0;
                    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

                }

                .ring {
                    position: absolute;
                    width: 100px; height: 100px;
                    border: 1px solid var(--current-color);
                    border-radius: 50%;
                    opacity: 0.2;
                    animation: pulse 3s infinite alternate ease-in-out;
                }

                @keyframes pulse { from { transform: scale(0.9); opacity: 0.1; } to { transform: scale(1.1); opacity: 0.3; } }

                .symbol { z-index: 2; width: 60px; height: 60px; filter: drop-shadow(0 0 10px var(--current-color)); }

                .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; cursor: pointer; border: 1px solid #444; }
                .dot.active { background: var(--current-color); box-shadow: 0 0 5px var(--current-color); border-color: #fff; }

                .info { padding: 20px; position: relative; z-index: 2; }
                
                .tag {

                    font-size: 8px; font-weight: 900; padding: 5px 5px;
                    width: fit-content; text-transform: uppercase; margin-bottom: 10px;

                .title { font-size: 0.75rem; margin: 0 0 10px 0; text-transform: uppercase; color: #fff; line-height: 1.2; }
                .desc { font-size: 0.6rem; color: #888; line-height: 1.6; text-align: justify; }

                        margin-bottom: 5px;
                    }
                    .occupation-grid {
                        gap: 40px;
                    }

window.updateCard = function(el, typeName) {
    const card = el.closest('.card');
    const config = typeLib[typeName];

    card.style.setProperty('--current-color', config.c);
    card.querySelector('.symbol').src = config.i;
    card.querySelector('.tag').innerText = config.n;

    card.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');

    if (card.classList.contains('destaque')) {
        const auxBox = card.querySelector('.auxiliar-box');
        const auxTitle = card.querySelector('.auxiliar-title');
        if (auxBox && auxTitle) {
            auxBox.style.borderColor = config.c;
            auxTitle.style.color = config.c;
        }
    }
};

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var titleElement = document.title;
            var intervalId;
            var repetitions = 3;
            var currentRepetition = 0;

            function startTitleAnimation() {
                var title = ": Virtual Links!";
                var index = 0;

                intervalId = setInterval(function () {
                    document.title = "POKÉMON" + title.substring(0, index);
                    index++;

                    if (index > title.length) {
                        clearInterval(intervalId);
                        setTimeout(function () {
                            currentRepetition++;

                            if (currentRepetition < repetitions) {
                                startTitleAnimation();
                            } else {
                                currentRepetition = 0;
                                setTimeout(function () {
                                    startTitleAnimation();
                                }, 1000);
                            }
                        }, 1000);
                    }
                }, 150); 
            }

            startTitleAnimation();
        });
    </script>

    <script>
        function updateClockAndDate() {
            var now = new Date();
            
            var futureDate = new Date(now.getFullYear() + 100, now.getMonth(), now.getDate());
            
            var optionsDate = { month: 'short', day: 'numeric', year: 'numeric' };
            var dateString = futureDate.toLocaleDateString('en-US', optionsDate);
            document.getElementById('date').innerText = dateString;

            var tokyoTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Tokyo"}));
            var hours = tokyoTime.getHours();
            var minutes = tokyoTime.getMinutes();
            var seconds = tokyoTime.getSeconds();

            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            var timeString = hours + ':' + minutes + ':' + seconds;
            document.getElementById('clock').innerText = timeString;
        }

        setInterval(updateClockAndDate, 1000); 
        updateClockAndDate(); 
    </script>
