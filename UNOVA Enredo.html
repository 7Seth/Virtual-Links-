<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.dropbox.com/scl/fi/rda7ohwdqojn7q2goa66i/iconpkmbw.png?rlkey=w4amn3yc2nhewlzz2v136qfo4&st=63n5zpvx&raw=1">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap">
    
    <title>POKÉMON: Virtual Links!</title>
    <style>
        :root {font-size: 16px;}
        img {user-select: none;}
        body {background: #f8f8f8;margin: 0;padding: 0;font-family: 'Bungee', cursive;display: flex;flex-direction: row;height: 100vh;overflow: hidden;}
        .title-font {font-family: 'Press Start 2P', cursive;}
        body::before {content: '';position: fixed;top: 0;left: 0;width: 50%;height: 100%;background-color: #111;background-image: linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%), linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%);background-size: 66px 66px;background-position: 0 0, 30px 30px;z-index: -2;}
        body::after {content: '';position: fixed;top: 0;right: 0;width: 50%;height: 100%;background-color: #f0f0f0;background-image: linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%), linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%);background-size: 66px 66px;background-position: 0 0, 30px 30px;z-index: -2;}
        .left-container {width: 49.5%;height: 100vh;display: flex;flex-direction: column;overflow: hidden;}
        .right-container {width: 50.5%;height: 100vh;overflow-y: auto;overflow-x: hidden;padding: 0 !important;box-sizing: border-box;}
        
        /* === ESTILOS ORIGINAIS DO CONTEÚDO NORMAL (mantidos para futuras páginas) === */
        .content {font-family: 'Share Tech', sans-serif;line-height: 1.6;font-size: 1.1rem;border: 10px solid black;border-right: 7px dashed black;border-left: 7px dashed black;border-radius: 7px;padding: 70px;background: rgba(255,255,255, 0.75);display: flex;flex-direction: column;min-height: 100%;}
        .content p {margin-bottom: 1rem;text-align: justify;}
        .content-bottom {margin-top: auto;text-align: center;padding: 1rem;margin-bottom: 1rem;}
        .content-bottom img {max-width: 5rem;height: auto;display: block;margin: 0 auto;}
        .right-container::-webkit-scrollbar {width: 7px;background: white;}
        .right-container::-webkit-scrollbar-thumb {background: gray;}
        .right-container::-webkit-scrollbar-thumb:hover {background: black;}
        header {background-color: rgba(0, 0, 0, 0.88);color: white;padding: 1.5rem;display: flex;align-items: center;justify-content: space-between;width: 100%;box-sizing: border-box;flex-shrink: 0;margin-top: 0.5%;}
        header img {width: 2.25rem;height: auto;margin-top: -2vh;}
        @keyframes gradientRepeat {0% {background-position: 0% 0%;}25% {background-position: 100% 0%;}50% {background-position: 100% 100%;}75% {background-position: 0% 100%;}100% {background-position: 0% 0%;}}
        .cape {width: 99.5%;padding: 3.1rem 0;text-align: center;background: linear-gradient(135deg, #001F3F, #003366, #663399, #8A2BE2, #7FFFD4, #00CED1, #20B2AA, #3CB371, #2E8B57, #006400);display: flex;justify-content: center;align-items: center;background-size: 200% 200%;animation: gradientRepeat 7s linear infinite;flex-shrink: 0;}
        .cape img {max-width: 5rem;height: auto;filter: contrast(40%) brightness(40%);animation: rotate 4s linear infinite;display: block;transition: filter 0.3s ease;}
        .cape img:hover {filter: contrast(40%) brightness(100%);}
        @keyframes rotate {0% {transform: rotate(0deg);}50% {transform: rotate(-200deg);}70% {transform: rotate(200deg);}100% {transform: rotate(0deg);}}
        footer {background: linear-gradient(to bottom, #000000, #111111, #222222);color: white;padding: 3rem;text-align: center;border-bottom: 1.5rem double #222;width: 100%;flex-grow: 1;box-sizing: border-box;display: flex;flex-direction: column;justify-content: center;margin-bottom: 1px;}
        .button-frame {display: flex;justify-content: space-between;align-items: flex-start;background: none;padding: 0.1rem 1.8rem 0.1rem 0.1rem;width: 100%;flex-shrink: 0;}
        .main-menu {display: flex;flex-direction: column;align-items: start;user-select: none;width: 58%;}
        .main-buttons {width: 100%;text-decoration: none;color: white;background-color: rgba(255,255,255, 0.4);border: 0.4rem groove white;border-right-style: ridge;border-bottom-style: ridge;font-family: 'Press Start 2P', sans-serif;font-size: 0.7rem;padding: 0.75rem 1rem;margin: 5px 0;cursor: pointer;box-sizing: border-box;}
        .main-buttons:hover {border-color: cyan;border-right-style: ridge;border-bottom-style: ridge;border-radius: 0.25rem;}
        .button-container {display: flex;justify-content: center;margin-top: 1rem;flex-wrap: wrap;}
        .pokebutton {width: 3.1rem;height: 3.1rem;margin: 0 1rem;padding: 0;background-color: transparent;border-radius: 50%;border: 0.4rem groove white;border-right-style: ridge;border-bottom-style: ridge;overflow: hidden;cursor: pointer;}
        .pokebutton img {width: 100%;height: 100%;border-radius: 50%;object-fit: cover;}
        .pokebutton img:hover {filter: invert(100%);}
        #date {font-size: 0.7rem;user-select: none;font-family: 'Share Tech', sans-serif;}
        #clock {font-size: 0.9rem;user-select: none;font-family: 'Share Tech', sans-serif;}
        .indicador {display: none;position: fixed;top: 0;right: 0;background-color: #222;padding: 0.7rem 0.5rem 0.5rem 0.7rem;width: 30%;text-align: center;color: white;font-family: 'Share Tech' !important;font-size: 1.1rem;z-index: 999999;border-radius: 0.5rem 0 0 0.5rem;}
        .down-arrow {display: flex;justify-content: center;margin-bottom: 1px;}
        .down-arrow img {max-width: 3rem;height: auto;}

        /* ====================== ENREDO (100% do right-container) ====================== */
        #unova-enredo {
            --plasma-cyan: #00f2ff;
            --grid-color: rgba(0, 242, 255, 0.1);

            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            box-sizing: border-box;
        }

        #unova-enredo .grid-bg {
            position: absolute;
            inset: -50%;
            width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: 0;
        }

        #unova-enredo .grid-trails {
            position: absolute;
            inset: 0;
            background: linear-gradient(var(--plasma-cyan) 0%, transparent 1px);
            background-size: 100% 100px;
            animation: trail-flow 4s ease-in-out infinite;
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
        }

        #unova-enredo .particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #unova-enredo .particle {
            position: absolute;
            background: var(--plasma-cyan);
            width: 2px; height: 10px;
            opacity: 0.3;
            animation: rise 5s linear infinite;
        }

        #unova-enredo .interaction-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 100%;
        }

        #unova-enredo .portal-core {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 300px;
            width: 100%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        #unova-enredo .portal-core::before {
            content: '';
            position: absolute;
            width: 170px; height: 170px;
            border: 2px dashed var(--plasma-cyan);
            border-radius: 50%;
            animation: rotate 15s linear infinite;
            opacity: 0.5;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        #unova-enredo .portal-core img {
            max-width: 120px;
            z-index: 2;
            filter: drop-shadow(0 0 15px var(--plasma-cyan));
            transition: transform 0.4s ease;
        }

        #unova-enredo .interaction-group:hover .portal-core img { transform: scale(1.1); }

        #unova-enredo #btn-label {
            color: black;
            text-shadow: 2px 1px 7px rgba(0, 242, 255, 1);
            margin-top: 25px;
            font-size: 20px;
            animation: blink 1.5s infinite;
            z-index: 5;
            text-align: center;
        }

        #unova-enredo #story {
            width: 85%;
            max-width: 800px;
            font-size: 12px;
            line-height: 1.8;           /* <<< ESPAÇAMENTO REDUZIDO (era 2.2) */
            text-align: justify;
            margin-top: 15px;
            margin-bottom: 5vh;
            z-index: 5;
            display: none;
            text-shadow: 1px 1px 7px rgba(0, 242, 255, 1);
        }

        #unova-enredo .celebi-float {
            position: absolute;
            width: 150px;
            z-index: 100;
            opacity: 0;
            filter: drop-shadow(0 0 12px #4ade80);
            transition: all 4s ease-in-out, opacity 1s ease;
        }

        #unova-enredo #vortex {
            position: absolute;
            inset: 0;
            z-index: 99;
            pointer-events: none;
            background: conic-gradient(from 0deg, var(--plasma-cyan), transparent, var(--plasma-cyan), transparent);
            opacity: 0;
            mix-blend-mode: screen;
        }

        #unova-enredo #scanner {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--plasma-cyan);
            box-shadow: 0 0 20px var(--plasma-cyan);
            z-index: 99;
            display: none;
            pointer-events: none;
        }

        #unova-enredo.active-scene {
            justify-content: flex-start !important;
            padding-top: 30px;
        }

        #unova-enredo .active-core {
            transform: scale(0.6);
            min-height: 180px !important;
            margin-bottom: 20px;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.2; } }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 600px; } }
        @keyframes rise { from { transform: translateY(110vh); opacity: 0; } to { transform: translateY(-10vh); opacity: 0.5; } }
        @keyframes trail-flow { 0% { background-position: 0 -100px; opacity: 0; } 50% { opacity: 0.15; } 100% { background-position: 0 100vh; opacity: 0; } }
        @keyframes clock-spin { 0% { transform: rotate(0deg) scale(1); opacity: 0; } 50% { opacity: 1; } 100% { transform: rotate(1080deg) scale(5); opacity: 0; } }

        /* ====================== MEDIA QUERIES (left-container 100% preservado) ====================== */
        @media (max-width: 768px) {
            body {flex-direction: column;height: auto;overflow-y: auto;}
            body::before {background-color: #f0f0f0;background-image: linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%), linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%);}
            body::after {top: 0;height: 100%;}
            .left-container {width: 100%;height: auto;order: 1;margin-bottom: 0;}
            .right-container {width: 100%;height: auto;flex-grow: 1;order: 2;padding: 0 !important;margin-top: 0;border: none;box-sizing: border-box;position: relative;}
            .button-frame {position: sticky;top: 0;z-index: 10;background-color: rgba(0, 0, 0, 0.95);width: 100%;box-sizing: border-box;padding: 0.6rem 1rem;justify-content: space-between;}
            header {margin-top: 0;padding: 1rem;}
            header img {margin-top: 0;}
            .cape {padding: 2rem 0;}
            .cape img {max-width: 4rem;}
            footer {padding: 1.5rem;border-bottom-width: 1rem;margin-bottom: 0;}
            .main-buttons {font-size: 0.6rem;padding: 0.5rem 0.75rem;border-width: 0.3rem;}
            .pokebutton {width: 2.5rem;height: 2.5rem;margin: 0 0.5rem;border-width: 0.3rem;}
            .down-arrow img {max-width: 3rem;}
            .indicador {width: 50%;left: auto;right: 0;}
            .main-menu {width: 68%;}
        }
        
        @media (max-width: 480px) {
            .pokebutton {width: 2rem;height: 2rem;margin: 0 0.25rem;}
            .button-container {margin-top: 0.5rem;}
        }
    </style>
</head>

    <!-- SCRIPTS ORIGINAIS -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var titleElement = document.title;
            var intervalId;
            var repetitions = 3;
            var currentRepetition = 0;

            function startTitleAnimation() {
                var title = ": Virtual Links!";
                var index = 0;
                intervalId = setInterval(function () {
                    document.title = "POKÉMON" + title.substring(0, index);
                    index++;
                    if (index > title.length) {
                        clearInterval(intervalId);
                        setTimeout(function () {
                            currentRepetition++;
                            if (currentRepetition < repetitions) {
                                startTitleAnimation();
                            } else {
                                currentRepetition = 0;
                                setTimeout(function () {
                                    startTitleAnimation();
                                }, 1000);
                            }
                        }, 1000);
                    }
                }, 150); 
            }
            startTitleAnimation();
        });
    </script>

    <script>
        function updateClockAndDate() {
            var now = new Date();
            var futureDate = new Date(now.getFullYear() + 100, now.getMonth(), now.getDate());
            var optionsDate = { month: 'short', day: 'numeric', year: 'numeric' };
            var dateString = futureDate.toLocaleDateString('en-US', optionsDate);
            document.getElementById('date').innerText = dateString;

            var tokyoTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Tokyo"}));
            var hours = tokyoTime.getHours();
            var minutes = tokyoTime.getMinutes();
            var seconds = tokyoTime.getSeconds();
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            var timeString = hours + ':' + minutes + ':' + seconds;
            document.getElementById('clock').innerText = timeString;
        }
        setInterval(updateClockAndDate, 1000); 
        updateClockAndDate(); 
    </script>

    <script>
        function changeText(text) {
            var indicadorText = document.getElementById('indicadorText');
            indicadorText.innerHTML = text;
            var indicador = document.querySelector('.indicador');
            indicador.style.display = (text !== '') ? 'flex' : 'none';
        }
        function hideIndicador() {
            var indicador = document.querySelector('.indicador');
            indicador.style.display = 'none';
        }
        const buttonConfigs = [
            { id: 'pokedex', text: 'POKÉDEX' }, { id: 'pokemon', text: 'POKÉMON' },
            { id: 'mochila', text: 'MOCHILA' }, { id: 'mercado', text: 'MERCADO' },
            { id: 'salvar', text: 'SALVAR' }, { id: 'presentes', text: 'PRESENTES' },
            { id: 'mapa', text: 'MAPA' }, { id: 'desafios', text: 'CONQUISTAS' },
            { id: 'alertas', text: 'NOTIFICAÇÕES' }, { id: 'treinador', text: 'TREINADOR' },
            { id: 'classificacao', text: 'CLASSIFICAÇÃO' }, { id: 'ovos', text: 'OVOS' }
        ];
        buttonConfigs.forEach(config => {
            const el = document.getElementById(config.id);
            if (el) {
                el.addEventListener('mouseover', () => changeText(config.text));
                el.addEventListener('mouseout', hideIndicador);
            }
        });
    </script>

    <!-- SCRIPT ENREDO -->
    <script>
        const container = document.getElementById('unova-enredo');
        const pContainer = document.getElementById('particleContainer');
        for (let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.height = (Math.random() * 15 + 5) + 'px';
            pContainer.appendChild(p);
        }

        const storyContent = `O Mundo Pokémon está prestes presenciar um grande pesadelo: o fim dos tempos é um evento iminente.\n\nEm Unova, uma sombra do século passado ressurge, o legado que trouxe à tona resquícios do afamado Team Plasma, seus mais novos membros são hegemonicamente hackers e políticos.\n\nAgora, sob o domínio econômico do Neo Team Plasma, o mundo está em perigo novamente. Com registros e documentos sobre seu passado sombrio apagados, eles estão maquiando a História com a propagação de filosofias transhumanistas e o futurismo, tudo isso através de um novo discurso pacifista sustentado pela implementação de um programa de Inteligência Artificial e a rede Virtual Links.\n\nPorém, através de um chamado místico, você foi alertado sobre uma perturbadora crise definitiva que assola o globo. Celebi, guardião da floresta e viajante do tempo, dá a você a missão de impedir a ascensão do Neo Team Plasma e evitar o fim do Mundo Pokémon.`;

        const group = document.getElementById('mainButton');
        const core = container.querySelector('.portal-core');
        const label = document.getElementById('btn-label');
        const storyDiv = document.getElementById('story');
        const vortex = document.getElementById('vortex');
        const scanner = document.getElementById('scanner');
        const celebi = document.getElementById('celebi');

        let isOpen = false;
        let scannerY = 0;

        group.onclick = function() {
            if (!isOpen) {
                isOpen = true;
                vortex.style.animation = 'clock-spin 1.5s forwards';
                container.classList.add('active-scene');
                core.classList.add('active-core');
                label.style.display = 'none';
                
                setTimeout(() => {
                    vortex.style.animation = 'none';
                    scanner.style.display = 'block';
                    storyDiv.style.display = 'block';
                    storyDiv.innerHTML = storyContent.replace(/\n/g, '<br><br>');
                    celebi.style.opacity = '0.7';
                    moveCelebi();
                    startScanner();
                }, 1000);
            } else {
                isOpen = false;
                storyDiv.style.display = 'none';
                storyDiv.innerHTML = "";
                scanner.style.display = 'none';
                celebi.style.opacity = '0';
                container.classList.remove('active-scene');
                core.classList.remove('active-core');
                label.style.display = 'block';
            }
        };

        function startScanner() {
            if (!isOpen) return;
            scannerY += 5;
            if (scannerY > container.offsetHeight) scannerY = 0;
            scanner.style.top = scannerY + 'px';
            requestAnimationFrame(startScanner);
        }

        function moveCelebi() {
            if (!isOpen) return;
            const x = Math.random() * (container.offsetWidth - 180);
            const y = Math.random() * (container.offsetHeight - 180);
            const r = Math.floor(Math.random() * 30) - 15;
            celebi.style.left = x + 'px';
            celebi.style.top = y + 'px';
            celebi.style.transform = `rotate(${r}deg)`;
            setTimeout(moveCelebi, 4000);
        }
    </script>

    <script>
        document.addEventListener('contextmenu', event => { event.preventDefault(); document.elementFromPoint(event.clientX, event.clientY).click(); });
        document.onkeydown = function(e) { if (e.ctrlKey || e.altKey || e.shiftKey) return false; };
        document.onselectstart = function() { return false; };
        document.oncopy = document.oncut = document.ondragstart = function() { return false; };
    </script>
</body>
</html>
