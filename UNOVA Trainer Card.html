<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unova: Trainer Card</title>
    <link rel="icon" href="https://www.dropbox.com/scl/fi/rda7ohwdqojn7q2goa66i/iconpkmbw.png?rlkey=w4amn3yc2nhewlzz2v136qfo4&st=63n5zpvx&raw=1" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    * { box-sizing: border-box; }
    :root { font-size: 16px; }
    img { user-select: none; }
    body { font-family: 'Press Start 2P', system-ui; background: #111; }

    body::after { content: ''; position: fixed; top: 0; right: 0; width: 50.5%; height: 100%; background: #0a0a0c; z-index: -2; overflow: hidden; background-image: linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) scale(2.5); transform-origin: center center; animation: grid-move-right 15s linear infinite; }
    @keyframes grid-move-right { from { background-position: 0 0; } to { background-position: 0 400px; } }
    .trainer-card { width: 100%; max-width: 98vw; height: auto; background-color: #f0f0f0; background-image: linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%), linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%); background-size: cover; background-position: 50% 50%; border: 12px solid #111; border-radius: 8px; box-shadow: 0 40px 80px -20px rgb(0 0 0 / 0.8), inset 0 0 60px rgba(255,255,255,0.4); position: relative; overflow: hidden; color: #111; box-sizing: border-box; margin: 0 auto; }
    .trainer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(transparent 50%, rgba(0,0,0,0.015) 50%), linear-gradient(90deg, transparent 50%, rgba(0,0,0,0.015) 50%); background-size: 60px 60px; pointer-events: none; opacity: 0.5; }
    .card-header { background: #111; color: #fff; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #111; }
    .header-icon { width: 30px; height: 30px; object-fit: contain; border-radius: 0; box-shadow: none; border: 2px solid #111; }
    .content { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
    .top-section { display: flex; flex-direction: row; gap: 10px; align-items: flex-start; }
    .left { display: flex; flex-direction: column; align-items: center; }
    .photo-area { width: 160px; height: 160px; background: #fff; border: 4px solid #111; border-radius: 0; overflow: hidden; cursor: pointer; transition: all 0.2s; margin: 0 auto; }
    .photo-area:hover { transform: scale(1.02); }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; color: #fff; font-size: 10px; text-align: center; padding: 6px; flex-direction: column; }
    .photo-area:hover .photo-overlay { display: flex; }
    .name-field { background: transparent; border-bottom: 3px solid #111; border-left: none; border-right: none; border-top: none; border-radius: 0; padding: 2px 8px; height: 24px; margin-top: 16px; position: relative; width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .name-input { font-size: 12px; font-weight: 900; letter-spacing: 0.6px; background: transparent; border: none; width: 100%; text-align: center; color: #111; outline: none; text-transform: uppercase; font-family: 'Press Start 2P', system-ui; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .message-area { background: rgba(0,0,0,0.9); color: #fff; border: 3px solid #111; border-radius: 8px; padding: 6px 8px; min-height: 100px; max-height: 100px; overflow: hidden; margin-top: 12px; width: 160px; }
    .message-input { width: 100%; height: auto; background: transparent; border: none; color: #fff; font-size: 10px; line-height: 1.2; resize: none; outline: none; text-align: left; font-style: italic; font-family: 'Press Start 2P', system-ui; }
    .right { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 0; }
    .stat-box { background: #fff; border: 3px solid #111; border-radius: 4px; padding: 6px 4px; position: relative; min-height: 35px; display: flex; align-items: start; justify-content: space-between; margin-top: 2px; margin-bottom: 2px; }
    .stat-label { font-size: 8px; color: #111; font-weight: 700; letter-spacing: 0.8px; position: absolute; top: -8px; background: #fff; padding: 0 3px; }
    .stat-input { font-size: 12px; font-weight: 900; background: transparent; border: none; width: 40%; outline: none; color: #000; padding: 0; text-align: right; cursor: pointer; font-family: 'Press Start 2P', system-ui; }
    .stat-unit { font-size: 8px; font-weight: 700; color: #000; margin-left: 3px; white-space: nowrap; font-family: 'Press Start 2P', system-ui; }
    .gender-box { background: #fff; border: 3px solid #111; border-radius: 4px;  padding: 6px 8px; position: relative; min-height: 35px; display: flex; align-items: start; justify-content: center; width: 100%; }
    .gender-select { font-size: 12px; text-align: start; font-weight: 700; background: transparent; border: none; outline: none; color: #111; cursor: pointer; font-family: 'Press Start 2P', system-ui; width: 100%; appearance: none; }
    .origin-box { grid-column: span 2; background: #fff; border: 3px solid #111; border-radius: 4px; position: relative; min-height: 35px; }
    .select-input { font-size: 10px; font-weight: 700; background: transparent; border: none; width: 100%; outline: none; color: #111; appearance: none; padding-right: 15px; cursor: pointer; font-family: 'Press Start 2P', system-ui; }
    .badges { margin-top: 8px; padding: 6px 8px; height: auto; border-radius: 8px; }
    .badges-grid { display: grid; grid-template-columns: repeat(4, 30px); gap: 10px; height: auto; justify-content: center; }
    .badge { width: 100%; aspect-ratio: 1; background-color: #111; background-size: contain; background-repeat: no-repeat; background-position: center; border: 2px solid #111; border-radius: 3px; transition: all 0.2s; }
    .badge:hover { transform: scale(1.05); }
    .panels { display: flex; flex-direction: column; gap: 10px; justify-content: center; margin: 20px auto 10px; max-width: 90%; }
    .color-panel, .badges-panel { background: #fff; border: 3px solid #111; border-radius: 8px; padding: 10px; flex: 1; min-width: 100%; box-shadow: 0 20px 40px -10px rgb(0 0 0 / 0.3); }
    .color-row, .badge-row { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 8px; }
    .color-row label, .badge-row label { font-size: 8px; font-weight: 700; color: #111; min-width: auto; }
    .color-row input[type="color"] { width: 35px; height: 20px; border: 2px solid #111; border-radius: 3px; cursor: pointer; }
    .badge-select { font-size: 9px; font-weight: 700; background: transparent; border: 1px solid #111; width: 100%; outline: none; color: #111; padding: 2px; font-family: 'Press Start 2P', system-ui; }
    .buttons { margin-top: 20px; margin-bottom: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin-left: auto; margin-right: auto; padding: 0 20px; }
    .action-btn { font-family: 'Press Start 2P', system-ui; font-size: 10px; font-weight: 700; padding: 8px 16px; border: 2px solid #111; border-radius: 2px; background: #fff; color: #111; cursor: pointer; transition: all 0.2s; letter-spacing: 0.4px; width: 100%; }
    .action-btn:hover { background: #111; color: #fff; transform: translateY(-1px); }
    .action-btn.download { background: #111; color: #fff; border: 2px solid #fff; }
    .action-btn.download:hover { background: #fff; color: #111; border: 2px solid #111; }
    .container { max-width: 600px; margin: 0 auto; }
    #team-card { min-height: 200px; }
    #team-card .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 20px 20px; }
    .pokemon-slot { background: transparent; padding: 2px 2px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 20px -8px rgba(0,0,0,0.7), inset 0 0 40px rgba(255,255,255,0.5); transition: all 0.2s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); cursor: pointer; }
    .pokemon-slot:hover { transform: scale(1.03); }
    .pokemon-sprite { width: 150px; height: 150px; margin-bottom: 10px; }
    .pokemon-name { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #111; text-align: center; min-height: 32px; word-break: break-word; line-height: 1.2; }
    .team-editor-row { display: flex; gap: 8px; justify-content: center; }
    .team-input { flex: 0.5; width: 50%; font-family: 'Press Start 2P', system-ui; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; background: #f0f0f0; border: 3px solid #111; padding: 8px 10px; outline: none; }
    .team-search-btn { font-family: 'Press Start 2P', system-ui; font-size: 9px; font-weight: 700; padding: 8px 14px; border: 3px solid #111; background: #fff; color: #111; cursor: pointer; white-space: nowrap; }
    .team-search-btn:hover { background: #111; color: #fff; }

    @media (max-width: 767px) {

        .stat-input { width: 50%; font-size: 10px; }
        .name-input { font-size: 10px; }
        .name-field { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .photo-area { width: 120px; height: 120px; }
        .name-field, .message-area { width: 120px; }
        .message-area { min-height: 80px; max-height: 80px; padding: 4px 6px; }
        .header-icon { width: 25px; height: 25px; }
        .card-header { padding: 6px 10px; font-size: 14px; }
        .content { padding: 5px; gap: 5px; overflow-x: hidden; }
        .top-section { gap: 5px; }
        .stats { gap: 2px; }
        .stat-box { padding: 4px 2px; min-height: 30px; }
        .stat-label { font-size: 6px; top: -6px; left: 4px; padding: 0 2px; letter-spacing: 0.4px; }
        .stat-input, .gender-select { font-size: 10px; }
        .stat-unit { font-size: 6px; margin-left: 2px; }
        .select-input { font-size: 8px; padding-right: 10px; }
        .badges-grid { grid-template-columns: repeat(4, 25px); gap: 5px; }
        .photo-overlay { font-size: 8px; }
        .color-row input[type="color"] { width: 30px; height: 18px; }
        .badge-select { font-size: 8px; }
        .action-btn { font-size: 8px; padding: 4px 12px; }
        .trainer-card { max-width: 100vw; border-width: 8px; }
        .left, .right { flex-shrink: 1; }
        .stat-box, .gender-box, .origin-box { border-width: 2px; }
        .team-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 18px 12px; }
        .pokemon-sprite { width: 92px; height: 92px; }
        .pokemon-name { font-size: 9px; min-height: 26px; }
        .team-input { font-size: 10px; padding: 7px; }
        .team-search-btn { padding: 7px 10px; font-size: 8px; }

    @media (min-width: 768px) {

        .message-area { min-height: 70px; max-height: 70px; }
        .header-icon { width: 40px; height: 40px; }
        .card-header { padding: 12px 30px; }
        .content { padding: 15px; gap: 15px; }
        .top-section { gap: 15px; }
        .stats { gap: 6px; }
        .stat-box { padding: 8px 6px; min-height: 45px; }
        .stat-label { font-size: 10px; top: -10px; left: 10px; }
        .stat-input, .gender-select { font-size: 14px; }
        .stat-unit { font-size: 10px; }
        .select-input { font-size: 12px; }
        .badges-grid { grid-template-columns: repeat(4, 40px); gap: 15px; }
        .message-input { font-size: 10px; }
        .name-input { font-size: 14px; }
        .photo-overlay { font-size: 12px; }
        .color-row input[type="color"] { width: 45px; height: 25px; }
        .badge-select { font-size: 11px; }
        .action-btn { font-size: 12px; padding: 8px 20px; }
        .panels { max-width: 800px; flex-direction: row; gap: 20px; }
        .color-panel, .badges-panel { min-width: auto; flex: 1; }
    }

    @media (min-width: 1024px) {
        .container { max-width: 1000px; }
        .trainer-card { max-width: 1000px; }
        .photo-area { width: 240px; height: 240px; }
        .name-field, .message-area { width: 240px; }
        .message-area { min-height: 90px; max-height: 90px; }
        .header-icon { width: 50px; height: 50px; }
        .card-header { padding: 16px 40px; }
        .content { padding: 20px; gap: 20px; }
        .top-section { gap: 20px; }
        .stats { gap: 8px; }
        .stat-box { padding: 10px 8px; min-height: 55px; }
        .stat-label { font-size: 12px; top: -12px; left: 12px; }
        .stat-input, .gender-select { font-size: 16px; }
        .stat-unit { font-size: 12px; }
        .select-input { font-size: 14px; }
        .badges-grid { grid-template-columns: repeat(4, 50px); gap: 20px; }
        .message-input { font-size: 12px; }
        .name-input { font-size: 16px; }
        .photo-overlay { font-size: 14px; }
        .color-row input[type="color"] { width: 55px; height: 30px; }
        .badge-select { font-size: 13px; }
        .action-btn { font-size: 14px; padding: 10px 24px; }
    }

    @media (min-width: 1440px) {
        .container { max-width: 1200px; }
        .trainer-card { max-width: 1200px; }
        .photo-area { width: 280px; height: 280px; }
        .name-field, .message-area { width: 280px; }
        .message-area { min-height: 110px; max-height: 110px; }
        .header-icon { width: 60px; height: 60px; }
        .card-header { padding: 20px 50px; }
        .content { padding: 25px; gap: 25px; }
        .top-section { gap: 25px; }
        .stats { gap: 10px; }
        .stat-box { padding: 12px 10px; min-height: 65px; }
        .stat-label { font-size: 14px; top: -14px; left: 14px; }
        .stat-input, .gender-select { font-size: 18px; }
        .stat-unit { font-size: 14px; }
        .select-input { font-size: 16px; }
        .badges-grid { grid-template-columns: repeat(4, 60px); gap: 25px; }
        .message-input { font-size: 14px; }
        .name-input { font-size: 18px; }
        .photo-overlay { font-size: 16px; }
        .color-row input[type="color"] { width: 65px; height: 35px; }
        .badge-select { font-size: 15px; }
        .action-btn { font-size: 16px; padding: 12px 28px; }
    }
</style>
</head>

        const genderSelect = document.getElementById('gender-select');
        const ageInput = document.getElementById('age-input');
        const heightInput = document.getElementById('height-input');
        const weightInput = document.getElementById('weight-input');
        const originSelect = document.getElementById('origin-select');
        const messageInput = document.getElementById('message-input');
        const cardPhoto = document.getElementById('card-photo');
        const photoArea = document.getElementById('photo-area');
        const photoUpload = document.getElementById('photo-upload');

        const colorCardBg = document.getElementById('color-card-bg');
        const colorCardBorder = document.getElementById('color-card-border');
        const colorBorder = document.getElementById('color-border');
        const colorText = document.getElementById('color-text');
        const colorLabelBg = document.getElementById('color-label-bg');
        const colorMessageBorder = document.getElementById('color-message-border');
        const colorMessageBg = document.getElementById('color-message-bg');
        const colorMessageText = document.getElementById('color-message-text');

        function init() {
            originSelect.innerHTML = '<option value=""></option>';
            unovaCities.forEach(city => {
                const o = document.createElement('option');
                o.value = city;
                o.textContent = city.toUpperCase();
                originSelect.appendChild(o);
            });

            const badgesGrid = document.getElementById('badges-grid');
            badgesGrid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const div = document.createElement('div');
                div.className = 'badge';
                div.dataset.index = i;
                badgesGrid.appendChild(div);
            }

            const selectsContainer = document.getElementById('badges-selects');
            selectsContainer.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const row = document.createElement('div');
                row.className = 'badge-row';
                row.innerHTML = `<label>Insígnia ${i+1}</label><select id="badge-select-${i}" class="badge-select"><option value="">Nenhuma</option></select>`;
                selectsContainer.appendChild(row);
                const select = row.querySelector('select');
                unovaBadges.forEach(badge => {
                    const opt = document.createElement('option');
                    opt.value = badge.id;
                    opt.textContent = badge.name.toUpperCase();
                    select.appendChild(opt);
                });
                select.addEventListener('change', handleBadgeSelectChange);
            }

            const saved = localStorage.getItem('unovaTrainerCardBW37');
            if (saved) {
                trainerData = JSON.parse(saved);
                currentID = trainerData.id || currentID;
            } else {
                currentID = Math.floor(100000 + Math.random() * 900000).toString().padStart(6, '0');
                trainerData = {
                    id: currentID,
                    name: '', gender: '', age: '', height: '', weight: '', origin: '', message: '',
                    photo: currentPhotoURL,
                    badges: Array(8).fill(''),
                    colors: { cardBg: '#f0f0f0', cardBorder: '#111111', border: '#111111', text: '#111111', labelBg: '#ffffff', messageBorder: '#111111', messageBg: '#111111', messageText: '#ffffff' },
                    team: Array(6).fill().map(() => ({name: '', sprite: ''}))
                };
            }

            loadTrainerData();

            [colorCardBg, colorCardBorder, colorBorder, colorText, colorLabelBg, colorMessageBorder, colorMessageBg, colorMessageText].forEach(el => el.addEventListener('input', applyColors));
            nameInput.addEventListener('input', () => {
                nameInput.value = nameInput.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '').slice(0, 14);
                updateTeamNameDisplay();
            });
            genderSelect.addEventListener('change', () => {});
            ageInput.addEventListener('input', () => {});
            heightInput.addEventListener('input', () => {});
            weightInput.addEventListener('input', () => {});
            originSelect.addEventListener('change', () => { originSelect.style.fontWeight = '900'; });
            messageInput.addEventListener('input', filterBadWords);
            photoArea.addEventListener('click', () => photoUpload.click());
            photoUpload.addEventListener('change', handlePhotoUpload);

            const teamGrid = document.getElementById('team-grid');
            teamGrid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const slot = document.createElement('div');
                slot.className = 'pokemon-slot';
                slot.innerHTML = `<img id="poke-img-${i}" class="pokemon-sprite" src="" alt=""><div id="poke-name-${i}" class="pokemon-name"></div>`;
                teamGrid.appendChild(slot);
            }

            const editor = document.getElementById('team-editor');
            editor.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'team-row';
                row.innerHTML = `
                    <label>Pokémon ${i+1}</label>
                    <div class="team-editor-row">
                        <input id="team-input-${i}" class="team-input" type="text" placeholder="NOME OU Nº" maxlength="20">
                        <button class="team-search-btn" onclick="searchPokemon(${i})">BUSCAR</button>
                        <button class="team-search-btn" onclick="removePokemon(${i})" style="background:#c00;color:#fff;border-color:#c00;">REMOVER</button>
                    </div>`;
                editor.appendChild(row);
            }

            renderTeam();
            updateTeamNameDisplay();
        }

        function loadTrainerData() {
            nameInput.value = trainerData.name || '';
            idDisplay.textContent = currentID;
            genderSelect.value = trainerData.gender || '';
            ageInput.value = trainerData.age || '';
            heightInput.value = trainerData.height || '';
            weightInput.value = trainerData.weight || '';
            originSelect.value = trainerData.origin || '';
            messageInput.value = trainerData.message || '';

            if (trainerData.photo) {
                currentPhotoURL = trainerData.photo;
                cardPhoto.src = currentPhotoURL;
            }

            if (trainerData.badges && trainerData.badges.length === 8) {
                for (let i = 0; i < 8; i++) {
                    const sel = document.getElementById(`badge-select-${i}`);
                    if (sel) sel.value = trainerData.badges[i] || '';
                    updateBadgeDisplay(i);
                }
            }

            if (trainerData.colors) {
                colorCardBg.value = trainerData.colors.cardBg;
                colorCardBorder.value = trainerData.colors.cardBorder;
                colorBorder.value = trainerData.colors.border;
                colorText.value = trainerData.colors.text;
                colorLabelBg.value = trainerData.colors.labelBg;
                colorMessageBorder.value = trainerData.colors.messageBorder;
                colorMessageBg.value = trainerData.colors.messageBg;
                colorMessageText.value = trainerData.colors.messageText;
                applyColors();
            }

            if (trainerData.team) teamData = trainerData.team;
            renderTeam();
            updateTeamNameDisplay();
        }

        function updateTeamNameDisplay() {
            const el = document.getElementById('team-name-display');
            if (el) el.textContent = (nameInput.value || '...').toUpperCase();
        }

        function handleBadgeSelectChange(e) {
            const index = parseInt(e.target.id.split('-')[2]);
            updateBadgeDisplay(index);
            const allSelects = document.querySelectorAll('.badge-select');
            const selected = Array.from(allSelects).map(s => s.value).filter(v => v !== '');
            allSelects.forEach(select => {
                Array.from(select.options).forEach(opt => {
                    if (opt.value && selected.includes(opt.value) && opt.value !== select.value) opt.disabled = true;
                    else opt.disabled = false;
                });
            });
        }

        function updateBadgeDisplay(index) {
            const select = document.getElementById(`badge-select-${index}`);
            const badgeDiv = document.querySelector(`.badge[data-index="${index}"]`);
            if (!badgeDiv) return;
            const value = select.value;
            if (value) {
                const badge = unovaBadges.find(b => b.id == value);
                badgeDiv.style.backgroundImage = `url(${badge.img})`;
                badgeDiv.style.backgroundColor = '#111';
                badgeDiv.style.border = '2px solid #888';
            } else {
                badgeDiv.style.backgroundImage = 'none';
                badgeDiv.style.backgroundColor = '#111';
                badgeDiv.style.border = '2px solid #111';
            }
        }

        function applyColors() {
            const cardBg = colorCardBg.value;
            const cardBorder = colorCardBorder.value;
            const border = colorBorder.value;
            const textColor = colorText.value;
            const labelBg = colorLabelBg.value;
            const msgBorder = colorMessageBorder.value;
            const msgBg = colorMessageBg.value;
            const msgText = colorMessageText.value;

            const frontCard = document.getElementById('trainer-card');
            const teamCard = document.getElementById('team-card');
            
            frontCard.style.backgroundColor = cardBg;
            frontCard.style.borderColor = cardBorder;
            teamCard.style.backgroundColor = cardBg;
            teamCard.style.borderColor = cardBorder;

            document.querySelectorAll('.stat-box, .name-field, .gender-box, .origin-box, .badge, .photo-area').forEach(el => el.style.borderColor = border);
            document.querySelectorAll('.stat-label, .stat-input, .stat-unit, .gender-select, .select-input, .name-input').forEach(el => {
                el.style.color = textColor;
                if (el.classList.contains('stat-label')) el.style.backgroundColor = labelBg;
            });
            document.querySelectorAll('.message-area').forEach(el => {
                el.style.backgroundColor = msgBg;
                el.style.borderColor = msgBorder;
                el.style.color = msgText;
            });
            document.querySelectorAll('.message-input').forEach(el => el.style.color = msgText);
            document.querySelectorAll('.pokemon-name').forEach(el => el.style.color = textColor);
        }

        function filterBadWords() {
            let t = messageInput.value;
            badWords.forEach(w => { t = t.replace(new RegExp(w, 'gi'), '****'); });
            messageInput.value = t;
        }

        function handlePhotoUpload(e) {
            const f = e.target.files[0];
            if (!f || f.size > 5 * 1024 * 1024) { alert('Foto inválida! Máx 5MB.'); return; }
            const r = new FileReader();
            r.onload = ev => { currentPhotoURL = ev.target.result; cardPhoto.src = currentPhotoURL; };
            r.readAsDataURL(f);
        }

        async function searchPokemon(slot) {
            const input = document.getElementById(`team-input-${slot}`);
            let query = input.value.trim();
            if (!query) {
                teamData[slot] = {name: '', sprite: ''};
                renderTeam();
                return;
            }
            if (/^\d+$/.test(query)) query = parseInt(query);
            else query = query.toLowerCase().replace(/\s+/g, '-');

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
                if (!res.ok) throw new Error();
                const p = await res.json();
                if (p.id > 649) throw new Error();

                const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/${p.id}.png`;

                teamData[slot] = {
                    name: p.name.charAt(0).toUpperCase() + p.name.slice(1),
                    sprite: sprite
                };
                renderTeam();
            } catch (e) {
                alert('Pokémon não encontrado!\n\nUse nome em inglês ou número de 1 a 649');
            }
        }

        function removePokemon(slot) {
            teamData[slot] = {name: '', sprite: ''};
            const input = document.getElementById(`team-input-${slot}`);
            if (input) input.value = '';
            renderTeam();
        }

        function renderTeam() {
            for (let i = 0; i < 6; i++) {
                const slot = teamData[i] || {name: '', sprite: ''};
                const img = document.getElementById(`poke-img-${i}`);
                const nameEl = document.getElementById(`poke-name-${i}`);
                if (img) img.src = slot.sprite || '';
                if (nameEl) nameEl.textContent = slot.name || '';
            }
        }

        function saveTrainerData() {
            const badges = [];
            for (let i = 0; i < 8; i++) {
                const sel = document.getElementById(`badge-select-${i}`);
                badges.push(sel ? sel.value || '' : '');
            }

            trainerData = {
                id: currentID,
                name: nameInput.value.trim(),
                gender: genderSelect.value,
                age: ageInput.value,
                height: heightInput.value,
                weight: weightInput.value,
                origin: originSelect.value,
                message: messageInput.value.trim(),
                photo: currentPhotoURL,
                badges: badges,
                colors: {
                    cardBg: colorCardBg.value,
                    cardBorder: colorCardBorder.value,
                    border: colorBorder.value,
                    text: colorText.value,
                    labelBg: colorLabelBg.value,
                    messageBorder: colorMessageBorder.value,
                    messageBg: colorMessageBg.value,
                    messageText: colorMessageText.value
                },
                team: teamData
            };

            localStorage.setItem('unovaTrainerCardBW37', JSON.stringify(trainerData));

            const btns = document.querySelectorAll('button[onclick="saveTrainerData()"]');
            btns.forEach(btn => {
                const original = btn.textContent;
                btn.textContent = 'SALVO!';
                setTimeout(() => btn.textContent = original, 1400);
            });
        }

        function resetAll() {
            if (!confirm('Reiniciar todos os dados?')) return;
            localStorage.removeItem('unovaTrainerCardBW37');
            currentID = Math.floor(100000 + Math.random() * 900000).toString().padStart(6, '0');
            currentPhotoURL = 'https://www.dropbox.com/scl/fi/480cflc155lmxpkmlwr4j/centerpkmbw.png?rlkey=leovgwbvok4anolgjdjx92dui&st=y2wu3x1a&raw=1';
            trainerData = {
                id: currentID,
                name: '', gender: '', age: '', height: '', weight: '', origin: '', message: '',
                photo: currentPhotoURL,
                badges: Array(8).fill(''),
                colors: { cardBg: '#f0f0f0', cardBorder: '#111111', border: '#111111', text: '#111111', labelBg: '#ffffff', messageBorder: '#111111', messageBg: '#111111', messageText: '#ffffff' },
                team: Array(6).fill().map(() => ({name: '', sprite: ''}))
            };
            teamData = trainerData.team;
            loadTrainerData();
            const btn = document.querySelector('button[onclick="resetAll()"]');
            if (btn) {
                const original = btn.textContent;
                btn.textContent = 'REINICIANDO...';
                setTimeout(() => btn.textContent = original, 1400);
            }
        }

        function focusGender() { genderSelect.focus(); }
        function focusAge() { ageInput.focus(); }
        function focusHeight() { heightInput.focus(); }
        function focusWeight() { weightInput.focus(); }
        function focusOrigin() { originSelect.focus(); }

        function exportFrontCard() {
            const cardElement = document.getElementById('trainer-card');
            html2canvas(cardElement, {
                scale: 3,
                useCORS: true,
                backgroundColor: cardElement.style.backgroundColor || '#f0f0f0',
                logging: false,
                onclone: (clonedDoc) => {
                    clonedDoc.querySelectorAll('input, select, textarea').forEach(el => {
                        if (el.id === 'photo-upload') return;
                        const span = clonedDoc.createElement('span');
                        let text = '';
                        if (el.tagName === 'SELECT') {
                            text = el.options[el.selectedIndex] ? el.options[el.selectedIndex].textContent : el.value;
                        } else {
                            text = el.value || '';
                        }
                        span.textContent = text;
                        span.style.cssText = window.getComputedStyle(el).cssText;
                        span.style.border = 'none';
                        span.style.background = 'transparent';
                        span.style.padding = '0';
                        span.style.margin = '0';
                        span.style.textAlign = el.style.textAlign || 'center';
                        span.style.fontWeight = '900';
                        el.parentNode.replaceChild(span, el);
                    });
                }
            }).then(canvas => {
                const fileName = `unova-trainer-${currentID || '000000'}.png`;
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
                const btn = document.querySelector('button[onclick="exportFrontCard()"]');
                const originalText = btn.textContent;
                btn.textContent = '✅ BAIXADO!';
                setTimeout(() => btn.textContent = originalText, 2000);
            }).catch(err => {
                console.error('Erro!', err);
                alert('Erro ao gerar a imagem!');
            });
        }

        function exportTeamCard() {
            const cardElement = document.getElementById('team-card');
            html2canvas(cardElement, {
                scale: 3,
                useCORS: true,
                backgroundColor: cardElement.style.backgroundColor || '#f0f0f0',
                logging: false
            }).then(canvas => {
                const fileName = `unova-equipe-${currentID || '000000'}.png`;
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
                const btn = document.querySelector('button[onclick="exportTeamCard()"]');
                const originalText = btn.textContent;
                btn.textContent = '✅ BAIXADO!';
                setTimeout(() => btn.textContent = originalText, 2000);
            }).catch(err => {
                console.error('Erro!', err);
                alert('Erro ao gerar a imagem!');
            });
        }

        window.onload = init;
    </script>
</body>
</html>
